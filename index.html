<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mod-4-project</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <header>
    <figure>
      <img src="public/Poké_Ball_icon.svg.png" alt="Pokeball Logo">
    </figure>
    <a href="info.html">
      <button id="random-btn" type="button">Random Pokemon</button>
    </a>
  </header>
  <main>
    <h1>Poke-Buddies</h1>
    <form id="poke-search" action="info.html" method="get">
      <div>
        <input id="poke-search-input" type="search" name="search" placeholder="Search by name or id" required>
      </div>
      <button type="submit">Submit</button>
    </form>
    <ul id="poke-list"></ul>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
