<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mod-4-project</title>
  <link rel="stylesheet" href="/src/info.css">

</head>

<body>
  <header>
    <a href="index.html"><img src="img/Poké_Ball_icon.svg.png" alt="logo"></a>
  </header>

  <main>
    <div id="missing">
      <section id="poke-info">
        <h2 id="pokemon-name">#000 MISSINGNO</h2>
        <img id="pokemon-pic"
          src="https://static.wikia.nocookie.net/pokemontowerdefense/images/c/ce/Missingno_image.png/" alt="404">
      </section>
      <aside id="moves-list">
        <details id="lists">
          <summary id='sum'>Moves List</summary>
          <ul id='movesUl'>
            <li>Sky Attack</li>
            <li>Water Gun</li>
            <li>Water Gun</li>
          </ul>
        </details>
      </aside>
      <div id="right-col">

        <div id='typing'>
          <h3>Type</h3>
          <ul>
            <li>
              <p id=" speical-type">Bird</p>
            </li>
            <li>
              <p id="speical-type">999</p>
            </li>
          </ul>
          <h3>Weakness</h3>
          <ul>
            <li>
              <p id="speical-type">ERROR</p>
            </li>
            <li>
              <p id="speical-type">404</p>
            </li>
          </ul>
        </div>
        <button id="sound">Poki sound</button>
      </div>
    </div>
    <div id="moves-data">
      <section id="move-info" class="hidden">
        <p id="error">Your pokemon appears to be abnormal.</p>
      </section>
    </div>
  </main>

  <script type="module" src="/src/info.js"></script>

</body>

</html>
